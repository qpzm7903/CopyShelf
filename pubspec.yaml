name: copyshelf
description: Windows 片段启动器 — 快速搜索并粘贴你预先配置的文本片段
publish_to: 'none'
version: 0.1.7

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  shared_preferences: 2.5.5
  path_provider: 2.1.5
  window_manager: 0.5.1
  uuid: 3.0.7
  win32: ^5.5.0
  ffi: ^2.1.0
  lpinyin: ^2.0.3
  tray_manager: ^0.5.3
  win32_registry: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.ico
