name: Feature request
description: 提议一个符合主动片段启动器定位的改进
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        CopyShelf 是主动片段启动器，不记录剪贴板历史，也不执行 shell、PowerShell 或 JavaScript 片段。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述实际工作流和成本，不要只描述按钮或技术方案。
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 期望结果
      description: 说明完成后用户能更快、更可靠地完成什么。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 当前替代方式
      description: 目前如何绕过，以及为什么不够好。
  - type: dropdown
    id: frequency
    attributes:
      label: 使用频率
      options:
        - 每天多次
        - 每天
        - 每周
        - 偶尔
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 可验证的完成标准
      placeholder: 完成后应能观察到哪些具体行为？
  - type: checkboxes
    id: boundaries
    attributes:
      label: 产品边界
      options:
        - label: 该建议不依赖记录剪贴板历史。
          required: true
        - label: 该建议不要求 CopyShelf 执行片段内容。
          required: true
