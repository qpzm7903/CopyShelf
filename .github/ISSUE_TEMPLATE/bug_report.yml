name: Bug report
description: 报告可复现的 CopyShelf 问题
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        请勿提交片段正文、剪贴板内容、Git 凭据或私人仓库地址。日志请先脱敏。
  - type: input
    id: version
    attributes:
      label: CopyShelf 版本
      placeholder: 例如 v0.1.25
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows 环境
      description: 包括 Windows 版本、系统架构，以及是否通过 RDP 或虚拟机运行。
      placeholder: Windows 11 24H2, x86_64, 本机
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: 发生频率
      options:
        - 每次
        - 经常
        - 偶尔
        - 仅发生一次
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 按下...
        3. 选择...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: 脱敏后的诊断信息
      description: 可附截图或日志，但请删除私人文本、路径、仓库地址和凭据。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已确认没有提交片段正文、剪贴板内容或凭据。
          required: true
        - label: 我已搜索现有 Issue，没有找到相同问题。
          required: true
